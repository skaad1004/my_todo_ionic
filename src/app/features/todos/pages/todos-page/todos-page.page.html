<ion-header class="todo-header" [translucent]="true">
  <ion-toolbar>
    <div class="header-content">
      <h1 class="header-title">Mis Tareas</h1>
      <p class="header-subtitle">{{ (pending$ | async)?.length || 0 }} pendientes</p>
    </div>
    <ion-buttons slot="end">
      <ion-button (click)="openManageCategories()">
        <ion-icon slot="icon-only" name="pricetags-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <div class="category-filters">
    <ion-chip [color]="selectedCategoryId === null ? 'primary' : 'medium'" (click)="setCategoryFilter(null)">
      <ion-label>Todas</ion-label>
    </ion-chip>

    <ion-chip *ngFor="let category of categories$ | async"
      [color]="selectedCategoryId === category.id ? category.color : 'medium'" (click)="setCategoryFilter(category.id)">
      <ion-label>{{ category.name }}</ion-label>
    </ion-chip>
  </div>
  <div class="page-wrapper">
    <app-todo-form (addTask)="addTask($event)"></app-todo-form>

    <div class="section" *ngIf="(pending$ | async)?.length">
      <div class="section-header">
        <ion-icon name="time-outline" class="section-icon"></ion-icon>
        <h2 class="section-title">Pendientes</h2>
        <span class="section-badge">{{ (pending$ | async)?.length }}</span>

        <ion-button *ngIf="showManageCategoriesButton" fill="clear" class="sort-btn" (click)="togglePriorityOrder()">
          <ion-icon slot="icon-only" [name]="isPriorityDesc ? 'arrow-down-outline' : 'arrow-up-outline'">
          </ion-icon>
        </ion-button>
      </div>

      <app-todo-list [tasks]="(pending$ | async) ?? []" (toggle)="toggleTask($event)" (remove)="deleteTask($event)">
      </app-todo-list>
    </div>

    <div class="section" *ngIf="(completed$ | async)?.length">
      <div class="section-header">
        <ion-icon name="checkmark-done-outline" class="section-icon completed"></ion-icon>
        <h2 class="section-title">Completadas</h2>
        <span class="section-badge completed">{{ (completed$ | async)?.length }}</span>
      </div>
      <app-todo-list [tasks]="(completed$ | async) ?? []" (toggle)="toggleTask($event)"
        (remove)="deleteTask($event)"></app-todo-list>
    </div>

    <!-- Empty state when there are no tasks at all -->
    <div class="empty-state" *ngIf="!(pending$ | async)?.length && !(completed$ | async)?.length">
      <div class="empty-icon-wrapper">
        <ion-icon name="rocket-outline" class="empty-icon"></ion-icon>
      </div>
      <h3 class="empty-title">¡Todo listo!</h3>
      <p class="empty-subtitle">Agrega tu primera tarea para comenzar</p>
    </div>
  </div>
</ion-content>
